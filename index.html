<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTL Auto Credit Expert</title>
</head>

<body>

    <nav>
        <div>MTL Auto Credit Expert</div>

        <div>
            <select onchange="setLang(this.value)" class="lang-switch">
                <option value="en">EN</option>
                <option value="fr">FR</option>
            </select>
        </div>
    </nav>

    <header>
        <div class="overlay">
            <h1 id="title">Get Approved Today</h1>
            <p id="subtitle">Good credit • Bad credit • No credit • Bankruptcy</p>
            <p class="tel-link">📞 438-453-2877</p>

            <button class="cta" onclick="scrollToForm()">Apply Now</button>
        </div>
    </header>

    <section style="padding:60px; text-align:center;">
        <h2 class="gold">Quick Application</h2>

        <div class="form-container">

            <div data-fs-success class="success"></div>
            <div data-fs-error class="error"></div>

            <form id="my-form" novalidate>

                <input type="text" name="name" placeholder="Full Name" required data-fs-field>

                <input type="tel" name="phone" placeholder="Phone Number" required data-fs-field
                    inputmode="numeric" autocomplete="tel">
                <span class="error" id="phone-error"></span>

                <input type="email" name="email" placeholder="Email" required data-fs-field>
                <span class="error" id="email-error"></span>

                <input type="text" name="income" placeholder="Monthly Income" data-fs-field>

                <select name="employment" class="placeholder" data-fs-field
                    onchange="this.classList.toggle('placeholder', this.value === '')">
                    <option value="" selected disabled hidden>Employment Status</option>
                    <option>Employed</option>
                    <option>Self-employed</option>
                    <option>Unemployed</option>
                </select>

                <select name="credit" class="placeholder" data-fs-field
                    onchange="this.classList.toggle('placeholder', this.value === '')">
                    <option value="" selected disabled hidden>Credit Situation</option>
                    <option>Good</option>
                    <option>Bad</option>
                    <option>No credit</option>
                    <option>Bankruptcy</option>
                </select>

                <button class="cta" type="submit" data-fs-submit-btn>
                    Submit Application
                </button>

            </form>

        </div>
    </section>

    <footer style="text-align:center; padding:30px;">
        <p>MTL Auto Credit Expert</p>
        <p>Montreal, QC</p>
        <p class="tel-link">📞 438-453-2877</p>
        <p>📧 Glen.autocreditexpert@gmail.com</p>
    </footer>

    <div class="floating" onclick="scrollToForm()">Apply</div>

    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script src="js/script.js" defer></script>

</body>

</html>
